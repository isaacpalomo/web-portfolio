name: Build & Deploy Frontend (GHCR -> Northflank)

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: frontend-main
  cancel-in-progress: true

jobs:
  build:
    name: Build & Push Frontend Image
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          CI_REGISTRY_IMAGE="ghcr.io/${GITHUB_REPOSITORY}-frontend"
          REF_SLUG="${GITHUB_REF_NAME,,}"
          REF_SLUG="${REF_SLUG//\//-}"
          SHORT_SHA="${GITHUB_SHA::8}"

          IMAGE_TAG="${CI_REGISTRY_IMAGE}:${REF_SLUG}-${SHORT_SHA}"

          echo "CI_REGISTRY_IMAGE=${CI_REGISTRY_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "ref_slug=${REF_SLUG}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_tag }}

  deploy:
    name: Deploy to Northflank
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Northflank CLI
        run: npm install -g @northflank/cli

      - name: Login to Northflank
        env:
          NORTHFLANK_API_TOKEN: ${{ secrets.NORTHFLANK_API_TOKEN }}
        run: northflank login --token "$NORTHFLANK_API_TOKEN"

      - name: Update Northflank service image
        env:
          NORTHFLANK_PROJECT_ID: ${{ secrets.NORTHFLANK_PROJECT_ID }}
          NORTHFLANK_SERVICE_ID: ${{ secrets.NORTHFLANK_SERVICE_ID }}
          NORTHFLANK_REGISTRY_CREDENTIALS_ID: ${{ secrets.NORTHFLANK_REGISTRY_CREDENTIALS_ID }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Updating Northflank service image to: ${IMAGE_TAG}"

          northflank update service deployment \
            --projectId "$NORTHFLANK_PROJECT_ID" \
            --serviceId "$NORTHFLANK_SERVICE_ID" \
            -i "{\"external\":{\"imagePath\":\"$IMAGE_TAG\",\"credentials\":\"$NORTHFLANK_REGISTRY_CREDENTIALS_ID\"},\"docker\":{\"configType\":\"default\"}}"
