<section id="contact" class="section" aria-labelledby="contact-heading">
  <div class="section__inner section__inner--narrow">
    <h2 id="contact-heading">{{ heading }}</h2>
    <p class="section__lede" *ngIf="lede">{{ lede }}</p>

    <div class="contact__grid">
      <div class="contact__item">
        <div class="contact__item-main">
          <span class="contact__icon" aria-hidden="true">
            <svg
              viewBox="0 0 24 24"
              width="20"
              height="20"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M4 4h16v16H4z" />
              <path d="m22 6-10 7L2 6" />
            </svg>
          </span>
          <div class="contact__text">
            <div class="contact__label">Email</div>
            <a class="contact__value" [href]="mailtoHref">{{ contactEmail }}</a>
          </div>
        </div>
      </div>

      <a
        class="contact__item contact__item-link"
        [href]="linkedinUrl"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="LinkedIn profile"
      >
        <span class="contact__icon" aria-hidden="true">
          <svg
            viewBox="0 0 24 24"
            width="20"
            height="20"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"
            />
            <rect x="2" y="9" width="4" height="12" />
            <circle cx="4" cy="4" r="2" />
          </svg>
        </span>
        <div class="contact__text">
          <div class="contact__label">LinkedIn</div>
          <div class="contact__value">View profile</div>
        </div>
      </a>

      <a
        class="contact__item contact__item-link"
        [href]="githubUrl"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="GitHub profile"
      >
        <span class="contact__icon" aria-hidden="true">
          <svg
            viewBox="0 0 24 24"
            width="20"
            height="20"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"
            />
          </svg>
        </span>
        <div class="contact__text">
          <div class="contact__label">GitHub</div>
          <div class="contact__value">View profile</div>
        </div>
      </a>

      <a
        *ngIf="resumePdfPath"
        class="contact__item contact__item-link"
        [href]="resumePdfPath"
        download
        aria-label="Download resume"
      >
        <span class="contact__icon" aria-hidden="true">
          <svg
            viewBox="0 0 24 24"
            width="20"
            height="20"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <path d="M7 10l5 5 5-5" />
            <path d="M12 15V3" />
          </svg>
        </span>
        <div class="contact__text">
          <div class="contact__label">Resume</div>
          <div class="contact__value">Download PDF</div>
        </div>
      </a>
    </div>
  </div>
</section>
